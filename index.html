<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Video - Scroll</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #fff;
        }

        body {
            height: 300vh;
            background: #fff;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: #fff;
        }

        #videoFrame {
            max-width: 90%;
            max-height: 90vh;
            object-fit: contain;
        }

        .download-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #000;
            color: #fff;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10000;
            font-size: 14px;
        }

        .download-btn:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <img id="videoFrame" src="frame_00000.png" alt="Animation">
    </div>

    <button class="download-btn" id="downloadBtn">⬇️ Salvează Frame</button>

    <script>
        const videoFrame = document.getElementById('videoFrame');
        const downloadBtn = document.getElementById('downloadBtn');

        const TOTAL_FRAMES = 150;
        let currentFrameIndex = 0;

        // Download button
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = videoFrame.src;
            link.download = `chess-frame-${currentFrameIndex}.png`;
            link.click();
        });

        // Scroll handler
        window.addEventListener('scroll', () => {
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollRatio = Math.min(window.scrollY / scrollHeight, 1);
            const frameIndex = Math.floor(scrollRatio * (TOTAL_FRAMES - 1));

            if (frameIndex !== currentFrameIndex && frameIndex >= 0 && frameIndex < TOTAL_FRAMES) {
                currentFrameIndex = frameIndex;
                const frameFile = `frame_${frameIndex.toString().padStart(5, '0')}.png`;
                videoFrame.src = frameFile;
            }
        });
    </script>
</body>
</html>
